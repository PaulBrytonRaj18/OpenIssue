services:
  # ─── PostgreSQL with pgvector ───────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: issuecompass_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-issuecompass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-issuecompass}
      POSTGRES_DB: ${POSTGRES_DB:-issuecompass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issuecompass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis (caching + rate limiting + background workers) ──
  redis:
    image: redis:7-alpine
    container_name: issuecompass_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: issuecompass_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-issuecompass}:${POSTGRES_PASSWORD:-issuecompass}@db:5432/${POSTGRES_DB:-issuecompass}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      AI_ENABLED: "true"
      JINA_API_KEY: ${JINA_API_KEY}
      JINA_EMBED_MODEL: ${JINA_EMBED_MODEL:-jina-embeddings-v3}
      EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-true}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      REDIS_MAX_CONNECTIONS: "20"
      REDIS_SOCKET_TIMEOUT: "5"
      REDIS_SOCKET_CONNECT_TIMEOUT: "5"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      METRICS_API_KEY: ${METRICS_API_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "8000:8000"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ─── Next.js Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: issuecompass_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    ports:
      - "3000:8080"
    command: sh -c "npm run build && npm start"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
    internal: false  # allow outbound to GitHub API / AI providers
